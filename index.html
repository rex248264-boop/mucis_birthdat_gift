<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>想见你OST</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="player-panel" aria-label="音乐播放器">
      <div class="cover-wrap">
        <img id="cover" class="cover" src="assets/covers/default-cover.svg" alt="音乐封面">
      </div>

      <div class="track-meta">
        <p class="eyebrow">想见你OST</p>
        <h1 id="title">选择一首歌</h1>
        <p id="artist">一凯</p>
      </div>

      <audio id="audio" preload="metadata"></audio>

      <div class="custom-player" aria-label="播放控制">
        <button id="playBtn" class="play-button" type="button" aria-label="播放">
          <span id="playIcon">▶</span>
        </button>
        <div class="time-display">
          <span id="currentTime">0:00</span>
          <span>/</span>
          <span id="duration">0:00</span>
        </div>
        <label class="progress-wrap" aria-label="播放进度">
          <input id="progress" type="range" min="0" max="1000" value="0">
        </label>
      </div>
    </section>

    <section class="playlist-panel" aria-label="播放列表">
      <div class="playlist-heading">
        <h2>播放列表</h2>
        <p id="songCount">正在读取歌曲...</p>
      </div>
      <div id="playlist" class="playlist"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
